services:
  - type: web
    name: retailflow-auth
    env: docker
    dockerfilePath: ./auth-service/Dockerfile
    dockerContext: ./auth-service
    plan: free
    envVars:
      - key: CORS_ALLOWED_ORIGINS
        value: https://retailflow-frontend.onrender.com

  - type: web
    name: retailflow-product
    env: docker
    dockerfilePath: ./product-service/Dockerfile
    dockerContext: ./product-service
    plan: free
    envVars:
      - key: CORS_ALLOWED_ORIGINS
        value: https://retailflow-frontend.onrender.com

  - type: web
    name: retailflow-order
    env: docker
    dockerfilePath: ./order-service/Dockerfile
    dockerContext: ./order-service
    plan: free
    envVars:
      - key: CORS_ALLOWED_ORIGINS
        value: https://retailflow-frontend.onrender.com

  - type: web
    name: retailflow-alert
    env: docker
    dockerfilePath: ./alert-service/Dockerfile
    dockerContext: ./alert-service
    plan: free
    envVars:
      - key: CORS_ALLOWED_ORIGINS
        value: https://retailflow-frontend.onrender.com

  - type: web
    name: retailflow-frontend
    env: static
    buildCommand: cd frontend-dashboard && npm install && npm run build
    staticPublishPath: ./frontend-dashboard/dist
    envVars:
      - key: VITE_AUTH_URL
        value: https://retailflow-auth.onrender.com
      - key: VITE_PRODUCT_URL
        value: https://retailflow-product.onrender.com
      - key: VITE_ORDER_URL
        value: https://retailflow-order.onrender.com
      - key: VITE_ALERT_URL
        value: https://retailflow-alert.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
